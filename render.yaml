services:
  - type: web
    name: dreams-into-reality
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENABLE_EXTERNAL_RESOURCES
        value: "true"
      - key: RESOURCE_REFRESH_DAYS
        value: "7"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "8"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-5"
      - key: AI_TOPIC_EXTRACTION_ENABLED
        value: "false"
      - key: HF_API_KEY
        sync: false
      - key: HF_MODEL
        value: "google/flan-t5-large"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: "evidence"
      - key: SIGNED_URL_EXPIRES_SECONDS
        value: "600"
      - key: AUTO_FETCH_RESOURCES_ON_CREATE
        value: "true"
      - key: DEFAULT_TIMEZONE
        value: "Asia/Kolkata"
