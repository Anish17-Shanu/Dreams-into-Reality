services:
  - type: web
    name: dreams-into-reality
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENABLE_EXTERNAL_RESOURCES
        value: "true"
      - key: RESOURCE_REFRESH_DAYS
        value: "7"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "8"
